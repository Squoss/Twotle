version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: [ "*" ]

  - package-ecosystem: "npm"
    directory: "/fegui"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns: [ "*" ]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns: [ "*" ]
    ignore:
      # pinned to the Node 24 LTS line on purpose; bump major versions manually
      - dependency-name: "node"
        update-types: [ "version-update:semver-major" ]
