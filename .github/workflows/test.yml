name: Test

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Node.js 24
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: fegui/package-lock.json
    - name: Clean install with npm
      run: npm ci
      working-directory: fegui
    - name: Typecheck with tsc
      run: npm run typecheck
      working-directory: fegui
    # no `npm test` step: fegui has no test suite yet
  sbt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up JDK 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: 'temurin'
        java-version: '25'
    - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
    - name: Test with sbt
      run: sbt test
      working-directory: beapi
